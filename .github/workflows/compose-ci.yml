name: Docker Compose CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  compose-smoke:
    runs-on: ubuntu-latest
    env:
      COMPOSE_HTTP_TIMEOUT: 200
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Start Docker Compose stack
        run: |
          docker compose up -d --build

      - name: Wait and list services
        run: |
          sleep 10
          docker compose ps

      - name: Smoke: run openclaw --version inside container
        run: |
          docker compose run --rm openclaw openclaw --version || true

      - name: Collect logs
        run: docker compose logs --no-color --tail=200 || true

      - name: Tear down
        if: always()
        run: docker compose down --volumes --remove-orphans || true
